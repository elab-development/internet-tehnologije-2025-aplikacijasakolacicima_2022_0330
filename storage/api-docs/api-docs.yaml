      summary: Konverzija RSD u EUR
      parameters:
        - in: query
          name: amount
          required: true
          schema:
            type: number
            example: 5000
          description: Iznos u RSD koji se konvertuje
      responses:
        "200":
          description: Rezultat konverzije
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    type: number
                    example: 42.55
                  info:
                    type: object
                    properties:
                      rate:
                        type: number
                        example: 0.00851
