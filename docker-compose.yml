version: "3.9"

services:

  # MySQL DB
  db:
    image: mysql:8.0
    container_name: kolacici_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-cookieapp}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./cookies_app.sql:/docker-entrypoint-initdb.d/cookies_app.sql
    ports:
      - "3306:3306"
    networks:
      - kolacici_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Laravel Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kolacici_backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      APP_NAME: "KolaciciApp"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:-}
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-cookieapp}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kolacici_net

  # Nginx – Laravel (port 8000)
  nginx-backend:
    image: nginx:1.25-alpine
    container_name: kolacici_nginx_backend
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./storage/app/public:/var/www/html/storage/app/public:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - kolacici_net

  #  Frontend (port 5173)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: kolacici_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - nginx-backend
    networks:
      - kolacici_net

# Volumes i Networks
volumes:
  db_data:
    driver: local

networks:
  kolacici_net:
    driver: bridge
