name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend
        run: curl "${{ secrets.RENDER_BACKEND_HOOK }}"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend
        run: curl "${{ secrets.RENDER_FRONTEND_HOOK }}"