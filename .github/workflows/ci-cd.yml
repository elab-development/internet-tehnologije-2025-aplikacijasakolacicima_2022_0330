name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write

jobs:
  test-backend:
    name: Backend Tests (PHPUnit)
    runs-on: ubuntu-latest

    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v4

      - name: Postavi PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, sqlite3, pdo_sqlite

      - name: Instaliraj PHP zavisnosti
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Pokreni backend testove
        run: php artisan test

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.event_name == 'push'

    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v4

      - name: Postavi Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prijavi se na GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build i push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build i push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy Backend
        run: curl "${{ secrets.RENDER_BACKEND_HOOK }}"

      - name: Deploy Frontend
        run: curl "${{ secrets.RENDER_FRONTEND_HOOK }}"